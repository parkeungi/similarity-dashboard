<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유사호출부호 - 검출 이력</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-size: 14px; letter-spacing: 2px;">데이터 로딩중...</div>
    </div>

    <div class="header">
        <div class="header-left">
            <a href="/" class="header-brand" style="text-decoration: none;">
                <span class="brand-icon">&#9992;</span>
                <div class="brand-text">
                    <h1>유사호출부호 모니터링</h1>
                    <span class="brand-sub">Similar Callsign Monitoring System</span>
                </div>
            </a>
            <nav class="header-nav">
                <a href="/" class="header-nav-item">실시간 검출</a>
                <a href="/history" class="header-nav-item active">검출 이력</a>
                <a href="/admin" class="header-nav-item">보고 이력</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="system-status">
                <div class="status-item">
                    <div id="network-dot" class="blink-dot"></div>
                    <span id="network-status">연결중...</span>
                </div>
                <div class="status-item">UTC <span id="realtime-clock">00:00:00</span></div>
            </div>
            <div class="header-contact">한국공항공사 시스템정보부 &#9742; 555</div>
        </div>
    </div>

    <div class="container">
        <div id="main-content" class="content-section full-width active">

            <!-- 통계 카드 (6개) -->
            <div class="stats-grid" style="grid-template-columns: repeat(6, 1fr);">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total" style="color: var(--accent-primary);">0</div>
                    <div class="stat-label">총 검출</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-danger" style="color: var(--accent-danger);">0</div>
                    <div class="stat-label">매우높음</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-warning" style="color: var(--accent-warning);">0</div>
                    <div class="stat-label">높음</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-info" style="color: #7dd3fc;">0</div>
                    <div class="stat-label">보통</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-active" style="color: var(--accent-secondary);">0</div>
                    <div class="stat-label">활성</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-cleared" style="color: var(--text-muted);">0</div>
                    <div class="stat-label">해제</div>
                </div>
            </div>

            <!-- 필터 섹션 -->
            <div class="card" style="margin-bottom: 20px;">
                <div class="filter-section">
                    <div class="filter-group">
                        <label>시작일:</label>
                        <input type="date" id="filter-from">
                    </div>
                    <div class="filter-group">
                        <label>종료일:</label>
                        <input type="date" id="filter-to">
                    </div>
                    <div class="filter-group">
                        <label>섹터:</label>
                        <select id="filter-sector">
                            <option value="ALL">전체</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>위험도:</label>
                        <select id="filter-risk">
                            <option value="">전체</option>
                            <option value="danger">매우높음</option>
                            <option value="warning">높음</option>
                            <option value="info">보통</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>상태:</label>
                        <select id="filter-status">
                            <option value="">전체</option>
                            <option value="active">활성</option>
                            <option value="cleared">해제</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="applyFilter()">검색</button>
                    <button class="btn btn-ghost btn-sm" onclick="resetFilter()">초기화</button>
                    <button class="btn btn-ghost btn-sm" onclick="toggleChart()" style="margin-left: auto;">일별 추이</button>
                </div>
            </div>

            <!-- 일별 추이 차트 (기본 숨김) -->
            <div id="chart-section" class="card" style="margin-bottom: 20px; display: none;">
                <div class="card-header" style="margin-bottom: 15px;">
                    <div class="card-title" style="margin-bottom: 0;">일별 검출 추이</div>
                </div>
                <div class="monthly-chart-container">
                    <div id="daily-chart" class="monthly-chart" style="height: 160px;">
                        <!-- 동적으로 생성됨 -->
                    </div>
                    <div id="daily-labels" class="monthly-labels">
                        <!-- 동적으로 생성됨 -->
                    </div>
                </div>
            </div>

            <!-- 검출 목록 테이블 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">검출 목록 (<span id="data-count">0</span>건)</div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-ghost btn-sm" onclick="downloadExcel()">Excel 저장</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>검출시각</th>
                                <th>해제시각</th>
                                <th>섹터</th>
                                <th>유사호출부호</th>
                                <th>유사도</th>
                                <th>오류가능성</th>
                                <th>권고사항</th>
                                <th style="width: 50px;">보고</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody"></tbody>
                    </table>
                </div>
                <div id="pagination" style="padding: 12px 15px; background: rgba(15,23,42,0.5); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <!-- 동적으로 생성됨 -->
                </div>
            </div>

        </div>
    </div>

    <footer class="footer">
        <span>&copy; 2025 한국공항공사 시스템정보부 &middot; 유사호출부호 모니터링 시스템 v1.0</span>
    </footer>

    <!-- 검출 상세 보기 모달 -->
    <div id="detail-modal" class="modal">
        <div class="modal-content" style="width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 18px; color: var(--accent-primary);">검출 상세</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeDetailModal()">닫기</button>
            </div>
            <div id="detail-content">
                <!-- 동적으로 생성됨 -->
            </div>
        </div>
    </div>

    <!-- 공통 코드 먼저 로드 (SECTOR_MAP, escapeHtml, updateClock 등) -->
    <script src="js/common.js"></script>
    <script src="js/xlsx.full.min.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
