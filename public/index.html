<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>유사호출부호 모니터링</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 2px;">데이터 로딩중...</div>
    </div>

    <div class="header">
        <div class="header-left">
            <a href="/" class="header-brand" style="text-decoration: none;">
                <span class="brand-icon">&#9992;</span>
                <div class="brand-text">
                    <h1>유사호출부호 모니터링</h1>
                    <span class="brand-sub">Similar Callsign Monitoring System</span>
                </div>
            </a>
        </div>
        <div class="header-right">
            <div class="system-status">
                <div class="status-item">
                    <div id="network-dot" class="blink-dot"></div>
                    <span id="network-status">대기중</span>
                </div>
                <div class="status-item">KST <span id="realtime-clock">00:00:00</span></div>
            </div>
            <div class="header-shortcuts">
                <a href="/history" class="header-shortcut" title="검출 이력">&#128203;</a>
                <a href="/admin" class="header-shortcut" title="보고 이력">&#128221;</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="main-content" class="content-section full-width active">
            <div class="main-content">
                <!-- 섹터 현황 카드 영역 -->
                <div class="card" style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <div class="card-title" style="margin: 0; font-size: 15px;">섹터 현황</div>
                        <button class="btn btn-ghost" style="padding: 6px 14px; font-size: 13px;" onclick="filterBySector('ALL')">전체 섹터 보기</button>
                    </div>
                    <div id="sector-cards"></div>
                </div>

                <div class="card" style="padding: 0;">
                    <div style="padding: 16px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                        <div class="card-title" style="margin: 0; font-size: 20px;">실시간 유사호출부호 목록</div>
                        <!-- <button class="btn btn-ghost" style="padding: 8px 16px; font-size: 16px;" onclick="exportToExcel()">
                            <span style="margin-right: 4px;">📊</span> Excel 내보내기
                        </button> -->
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 22%;">유사호출부호</th>
                                    <th>항공사</th>
                                    <th>섹터</th>
                                    <th>유사도 등급</th>
                                    <th>오류가능성</th>
                                    <th>권고사항</th>
                                    <th style="width: 80px;">보고</th>
                                </tr>
                            </thead>
                            <tbody id="callsign-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 오류 보고 모달 -->
    <div id="reportModal" class="modal">
        <div class="modal-content" style="padding: 28px; width: 680px; max-width: 90%;">
            <div class="card-title" style="color: var(--accent-danger); margin-bottom: 16px; font-size: 20px;">유사호출부호 오류 보고</div>

            <input type="hidden" id="reportIdx">

            <div class="form-row" style="margin-bottom: 12px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">발생 일시 <span style="color: var(--accent-danger);">*</span></label>
                    <input type="datetime-local" id="reportDateTime" style="padding: 10px; font-size: 15px;">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">유사호출부호 <span style="color: var(--accent-danger);">*</span></label>
                    <input type="text" id="reportCallsign" readonly style="background: rgba(0,0,0,0.3); padding: 10px; font-size: 15px;">
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 12px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">오류 항공기 <span style="color: var(--accent-danger);">*</span></label>
                    <select id="reportAO" style="padding: 10px; font-size: 15px;">
                        <option value="">선택하세요</option>
                        <option value="1">FP1 (첫번째 항공기)</option>
                        <option value="2">FP2 (두번째 항공기)</option>
                        <option value="3">양쪽 모두</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">오류 유형 <span style="color: var(--accent-danger);">*</span></label>
                    <select id="reportType" style="padding: 10px; font-size: 15px;">
                        <option value="">선택하기</option>
                    </select>
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 12px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">세부오류유형 <span style="color: var(--accent-danger);">*</span></label>
                    <select id="safetyImpact" style="padding: 10px; font-size: 15px;">
                        <option value="">선택하세요</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label style="font-size: 16px;">보고자 <span style="color: var(--accent-danger);">*</span></label>
                    <div id="reporterWrapper">
                        <select id="reporterSelect" style="padding: 10px; font-size: 15px; width: 100%;">
                            <option value="">로딩중...</option>
                        </select>
                        <input type="text" id="reporterInput" placeholder="이름 입력" maxlength="10" style="padding: 10px; font-size: 15px; display: none; width: 100%;">
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 12px;">
                <label style="font-size: 16px;">비고 (선택사항)</label>
                <textarea id="reportRemark" placeholder="추가 설명 (최대 200자)" maxlength="200" style="min-height: 60px; padding: 10px; font-size: 15px;"></textarea>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 14px;">
                <button class="btn btn-ghost" style="flex: 1; padding: 14px; font-size: 18px;" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" style="flex: 1; padding: 14px; font-size: 18px;" onclick="submitReport()">보고 제출</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <span>&copy; 2025 한국공항공사 시스템정보부 &middot; 유사호출부호 모니터링 시스템 v1.0</span>
    </footer>

    <!-- SheetJS 라이브러리 (Excel 내보내기용) -->
    <script src="js/xlsx.full.min.js"></script>
    <!-- 공통 코드 먼저 로드 (SECTOR_MAP, escapeHtml, updateClock 등) -->
    <script src="js/common.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
